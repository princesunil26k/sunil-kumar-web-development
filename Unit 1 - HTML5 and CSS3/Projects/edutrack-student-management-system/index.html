<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack Student Management System</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>EduTrack Student Management System</h1>

        <div class="dashboard">
            <h2>Total Students</h2>
            <p id="studentCount">0</p>
        </div>

        <div class="form-section">

            <h2>Add Student</h2>

            <input
                type="text"
                id="studentId"
                placeholder="Student ID"
            >

            <input
                type="text"
                id="studentName"
                placeholder="Student Name"
            >

            <input
                type="text"
                id="course"
                placeholder="Course"
            >

            <input
                type="text"
                id="semester"
                placeholder="Semester"
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
            >

            <input
                type="text"
                id="phone"
                placeholder="Phone Number"
            >

            <button id="addBtn">
                Add Student
            </button>

            <button onclick="generateStudents()">
                Generate Demo Data
            </button>

        </div>

        <div class="search-section">

            <input
                type="text"
                id="searchBox"
                placeholder="Search Student (Coming Soon)"
            >

        </div>

        <div class="table-section">

            <table>

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Course</th>
                        <th>Semester</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>

                </thead>

                <tbody id="studentTable">

                </tbody>

            </table>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
