<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    
    <!-- INTERNAL CSS START -->
    <style>
        /* Modern Reset and Typography */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f4f8;
            color: #333333;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container Layout Card */
        .form-container {
            background-color: #ffffff;
            max-width: 650px;
            width: 100%;
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        /* Header Accent Bands */
        .form-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #007bff;
            padding-bottom: 15px;
        }

        .form-header h1 {
            color: #007bff;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .form-header p {
            color: #666666;
            font-size: 0.95rem;
        }

        /* Structural Grid Fields */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444444;
            font-size: 0.9rem;
        }

        /* Input Controls Formatting */
        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.2s ease;
            outline: none;
        }

        .form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        /* Radio and Checkbox Layout Alignments */
        .radio-group, .checkbox-group {
            display: flex;
            gap: 20px;
            padding-top: 5px;
        }

        .radio-item, .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .radio-item input, .checkbox-item input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        /* Interactive Action Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-submit {
            background-color: #007bff;
            color: #ffffff;
        }

        .btn-submit:hover {
            background-color: #0056b3;
        }

        .btn-reset {
            background-color: #dc3545;
            color: #ffffff;
        }

        .btn-reset:hover {
            background-color: #bd2130;
        }

        /* Form Row Helper Grid for Side-by-Side Fields */
        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        /* Responsive Optimization rules */
        @media (max-width: 500px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
    <!-- INTERNAL CSS END -->
</head>
<body>

    <div class="form-container">
        <header class="form-header">
            <h1>Course Registration Form</h1>
            <p>Fill out the form below to apply for a new academic program</p>
        </header>

        <!-- Standard form processing method set to POST -->
        <form action="#" method="POST">
            
            <!-- Full Name Input Field -->
            <div class="form-group">
                <label for="fullName">Full Name *</label>
                <input type="text" id="fullName" name="fullName" class="form-control" placeholder="Enter your full name" required>
            </div>

            <!-- Email and Phone in a Side-by-Side Flex Layout Row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="example@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" class="form-control" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
                </div>
            </div>

            <!-- Date of Birth and Gender Layout Elements -->
            <div class="form-row">
                <div class="form-group">
                    <label for="dob">Date of Birth *</label>
                    <input type="date" id="dob" name="dob" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Gender *</label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="gender" value="male" required> Male
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="gender" value="female"> Female
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="gender" value="other"> Other
                        </label>
                    </div>
                </div>
            </div>

            <!-- Program Course Dropdown Configuration Box -->
            <div class="form-group">
                <label for="course">Select Course to Join *</label>
                <select id="course" name="course" class="form-control" required>
                    <option value="" disabled selected>-- Select a Course --</option>
                    <option value="bca">Bachelor of Computer Applications (BCA)</option>
                    <option value="bsc_cs">B.Sc. Computer Science</option>
                    <option value="btech_cse">B.Tech Computer Science & Engineering</option>
                    <option value="mca">Master of Computer Applications (MCA)</option>
                </select>
            </div>

            <!-- Complete Contact Postal Address Area -->
            <div class="form-group">
                <label for="address">Permanent Address *</label>
                <textarea id="address" name="address" class="form-control" placeholder="Enter your full address details" required></textarea>
            </div>

            <!-- Academic Declaration Validation Element -->
            <div class="form-group">
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" name="declaration" required> I declare that all the information provided above is correct.
                    </label>
                </div>
            </div>

            <!-- Submit and Clear Processing Actions Buttons -->
            <div class="btn-group">
                <button type="reset" class="btn btn-reset">Clear Form</button>
                <button type="submit" class="btn btn-submit">Submit Application</button>
            </div>

        </form>
    </div>

</body>
</html>
